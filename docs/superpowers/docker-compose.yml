# Pi Learning Guide - Docker Compose
# For local development and production deployment

services:
  # Production build
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-learning-guide
    ports:
      - "8082:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - pi-network

  # Development with live reload
  dev:
    image: node:20-alpine
    container_name: pi-learning-guide-dev
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    working_dir: /app
    networks:
      - pi-network

networks:
  pi-network:
    driver: bridge